<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>مترجم فوری · آلمانی فارسی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* تمام افکت‌های بصری حذف شده */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* عنوان: متن سیاه ساده */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* دکمه‌های مربعی (فقط حاشیه سیاه، پس‌زمینه سفید) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* دکمه فعال (هنگام انتخاب): پس‌زمینه خاکستری */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* دکمه میکروفون: سفید، حاشیه سیاه */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* جعبه‌های نتیجه: حاشیه سیاه، پس‌زمینه سفید */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: right;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: right;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: right;
        }

        #translatedText {
            color: black;
        }

        /* پیام وضعیت */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* دکمه بازگشت به صفحه اصلی */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇮🇷🗣️➡️🇩🇪 مترجم فوری · فارسی به آلمانی</h1>
    </div>

    <!-- دکمه‌های مربعی (فارسی / آلمانی) -->
    <div class="square-buttons">
        <div class="lang-square" id="squarePersian">
            <div class="lang-flag">🇮🇷</div>
            <div class="lang-name">فارسی</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">آلمانی</div>
        </div>
    </div>

    <div id="status" class="status-msg">زبانی را انتخاب کنید</div>
    <button class="mic-btn" id="micButton">🎙️ فشار دهید و صحبت کنید</button>

    <div class="result-box">
        <div class="result-label">متن تشخیص داده شده</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">ترجمه</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- دکمه بازگشت به صفحه اصلی -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 صفحه اصلی · بازگشت به صفحه اصلی</button>
    </div>
</div>

<script>
    // ---------- ترجمه فوری: فارسی <-> آلمانی (دکمه‌های مربعی با یک کلیک) ----------
    let sourceLang = "";      // "fa" یا "de"
    let targetCode = "";      // "de" یا "fa"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squarePersian = document.getElementById('squarePersian');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // حذف کلاس فعال از همه دکمه‌ها
    function clearActiveSquares() {
        squarePersian.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // فارسی -> آلمانی (یک کلیک)
    function setPersianToGerman() {
        sourceLang = "fa";
        targetCode = "de";
        clearActiveSquares();
        squarePersian.classList.add('active');   // پس‌زمینه خاکستری
        statusDiv.innerHTML = "فارسی → آلمانی";
        if (isRecording) stopRecording();
    }

    // آلمانی -> فارسی (یک کلیک)
    function setGermanToPersian() {
        sourceLang = "de";
        targetCode = "fa";
        clearActiveSquares();
        squareGerman.classList.add('active');   // پس‌زمینه خاکستری
        statusDiv.innerHTML = "آلمانی → فارسی";
        if (isRecording) stopRecording();
    }

    // رویدادهای کلیک برای دکمه‌ها
    squarePersian.addEventListener('click', (e) => {
        e.stopPropagation();
        setPersianToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToPersian();
    });

    // دکمه میکروفون: شروع / توقف ضبط
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ لطفاً ابتدا یک زبان را انتخاب کنید (فارسی یا آلمانی)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ مرورگر شما از تشخیص صدا پشتیبانی نمی‌کند. لطفاً از Chrome یا Edge استفاده کنید.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "fa" ? "fa-IR" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ در حال گوش دادن... الان صحبت کنید";
            recognizedTextDiv.innerText = "در حال تشخیص صدا...";
            translatedTextDiv.innerText = "در حال ترجمه...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ تشخیص صدا ناموفق بود";
            if (event.error === "not-allowed") errorMsg = "❌ دسترسی به میکروفون مجاز نیست";
            else if (event.error === "no-speech") errorMsg = "❌ صدایی تشخیص داده نشد، دوباره تلاش کنید";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ فشار دهید و صحبت کنید";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ متنی برای ترجمه وجود ندارد";
            return;
        }
        translatedTextDiv.innerHTML = "در حال ترجمه با گوگل...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ ترجمه ناموفق بود، دوباره تلاش کنید";
            translatedTextDiv.innerHTML = translation;

            // خواندن ترجمه با صدا (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "fa" ? "fa-IR" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ اتصال به سرویس ترجمه ناموفق بود، اتصال اینترنت خود را بررسی کنید";
        }
    }

    // دکمه بازگشت به صفحه اصلی (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // توقف ضبط و خواندن متن هنگام خروج از صفحه
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // تست دسترسی به میکروفون (بدون پیام اضافی)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ میکروفون کار می‌کند");
        } catch(e) {
            console.warn("⚠️ دسترسی به میکروفون امکان‌پذیر نیست");
        }
    }
    testMicrophone();

    // حالت اولیه: زبانی انتخاب نشده
    if(!sourceLang) {
        statusDiv.innerHTML = "ابتدا یک زبان را انتخاب کنید";
    }
</script>
</body>
</html>
