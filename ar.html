<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>مترجم فوري · ألماني عربي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Tajawal', 'Cairo', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* إزالة كل المؤثرات البصرية، التدرجات، الظلال */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* عنوان الصفحة: فقط نص عادي أسود */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* الأزرار المربعة (بدون ألوان، فقط خط أسود وخلفية بيضاء) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;   /* مربع بالكامل */
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* حالة النشاط (عند اختيار اللغة): خلفية رمادية فاتحة + إطار أسود */
        .lang-square.active {
            background: #d1d5db;    /* رمادي فاتح نقي */
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* زر الميكروفون: بسيط أبيض، خط أسود، نص أسود */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;   /* رمادي بارد أثناء التسجيل */
            border-color: black;
            animation: none;
        }

        /* صناديق النتائج: إطار أسود بسيط، خلفية بيضاء، نص أسود */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: right;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* حالة بسيطة */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* زر الرجوع للرئيسية: بسيط */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>مترجم فوري · ألماني عربي</h1>
    </div>

    <!-- أزرار مربعة (بدون الوان، خط أسود فقط، وعند الاختيار تصبح رمادية) -->
    <div class="square-buttons">
        <div class="lang-square" id="squareArabic">
            <div class="lang-flag">🇸🇦</div>
            <div class="lang-name">عربي</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">ألماني</div>
        </div>
    </div>

    <div id="status" class="status-msg">اختر اللغة</div>
    <button class="mic-btn" id="micButton">🎙️ اضغط وتحدث</button>

    <div class="result-box">
        <div class="result-label">النص المُتحدث</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">الترجمة</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- زر الرجوع إلى الصفحة الرئيسية -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 الرئيسية · العودة إلى الصفحة الرئيسية</button>
    </div>
</div>

<script>
    // ---------- منطق الترجمة الفورية (أزرار مربعة بنقرة واحدة) ----------
    let sourceLang = "";      // "ar" أو "de"
    let targetCode = "";      // "de" أو "ar"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squareArabic = document.getElementById('squareArabic');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // إزالة التحديد من جميع الأزرار المربعة
    function clearActiveSquares() {
        squareArabic.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // اتجاه عربي -> ألماني (نقرة واحدة)
    function setArabicToGerman() {
        sourceLang = "ar";
        targetCode = "de";
        clearActiveSquares();
        squareArabic.classList.add('active');   // يصبح الزر رمادي (بسبب class active)
        statusDiv.innerHTML = "عربي → ألماني";
        if (isRecording) stopRecording();
    }

    // اتجاه ألماني -> عربي (نقرة واحدة)
    function setGermanToArabic() {
        sourceLang = "de";
        targetCode = "ar";
        clearActiveSquares();
        squareGerman.classList.add('active');   // يصبح الزر رمادي
        statusDiv.innerHTML = "ألماني → عربي";
        if (isRecording) stopRecording();
    }

    // ربط الأزرار المربعة بنقرة واحدة
    squareArabic.addEventListener('click', (e) => {
        e.stopPropagation();
        setArabicToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToArabic();
    });

    // بدء التسجيل / الإيقاف
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ اختر اللغة أولاً (عربي أو ألماني)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ متصفحك لا يدعم التعرف على الصوت، يُفضل استخدام Chrome أو Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "ar" ? "ar-SA" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ جاري الاستماع ... تحدث الآن";
            recognizedTextDiv.innerText = "استمع الآن...";
            translatedTextDiv.innerText = "جاري الترجمة...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ لم يتم التعرف على الصوت";
            if (event.error === "not-allowed") errorMsg = "❌ لم تسمح بالوصول إلى الميكروفون";
            else if (event.error === "no-speech") errorMsg = "❌ لم يتم سماع أي صوت، حاول مرة أخرى";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ اضغط وتحدث";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ لم يتم إدخال نص للترجمة";
            return;
        }
        translatedTextDiv.innerHTML = "جاري الترجمة عبر Google...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ لم تنجح الترجمة، حاول مجددًا";
            translatedTextDiv.innerHTML = translation;

            // نطق الترجمة بصوت (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "ar" ? "ar-SA" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ فشل الاتصال بالترجمة، تأكد من الإنترنت";
        }
    }

    // زر العودة إلى الصفحة الرئيسية (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // عند مغادرة الصفحة إيقاف التسجيل والنطق
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // اختبار الميكروفون (بدون أي رسائل أو تأثيرات بصرية)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ الميكروفون يعمل");
        } catch(e) {
            console.warn("⚠️ لا يمكن الوصول إلى الميكروفون");
        }
    }
    testMicrophone();

    // إضافة تلميح بسيط: تحديد اللغة الافتراضية لا شيء
    if(!sourceLang) {
        statusDiv.innerHTML = "اختر اللغة أولاً";
    }
</script>
</body>
</html>
