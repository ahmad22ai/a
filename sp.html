<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Traductor Instantáneo · Español Alemán</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Todos los efectos visuales eliminados */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Título: texto negro simple */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Botones cuadrados (borde negro, fondo blanco) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Botón activo (cuando se selecciona): fondo gris */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* Botón micrófono: blanco, borde negro */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* Cajas de resultados: borde negro, fondo blanco */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* Mensaje de estado */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* Botón de regreso a la página principal */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇪🇸🗣️➡️🇩🇪 Traductor Instantáneo</h1>
    </div>

    <!-- Botones cuadrados (Español / Alemán) -->
    <div class="square-buttons">
        <div class="lang-square" id="squareSpanish">
            <div class="lang-flag">🇪🇸</div>
            <div class="lang-name">Español</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">Alemán</div>
        </div>
    </div>

    <div id="status" class="status-msg">Elige un idioma</div>
    <button class="mic-btn" id="micButton">🎙️ Presiona y Habla</button>

    <div class="result-box">
        <div class="result-label">TEXTO RECONOCIDO</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">TRADUCCIÓN</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- Botón de regreso a la página principal -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 Inicio · Volver a la página principal</button>
    </div>
</div>

<script>
    // ---------- Traducción instantánea: Español <-> Alemán (botones cuadrados con un clic) ----------
    let sourceLang = "";      // "es" o "de"
    let targetCode = "";      // "de" o "es"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squareSpanish = document.getElementById('squareSpanish');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // Eliminar la clase active de todos los botones
    function clearActiveSquares() {
        squareSpanish.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // Español -> Alemán (un clic)
    function setSpanishToGerman() {
        sourceLang = "es";
        targetCode = "de";
        clearActiveSquares();
        squareSpanish.classList.add('active');   // Fondo gris
        statusDiv.innerHTML = "Español → Alemán";
        if (isRecording) stopRecording();
    }

    // Alemán -> Español (un clic)
    function setGermanToSpanish() {
        sourceLang = "de";
        targetCode = "es";
        clearActiveSquares();
        squareGerman.classList.add('active');   // Fondo gris
        statusDiv.innerHTML = "Alemán → Español";
        if (isRecording) stopRecording();
    }

    // Manejadores de clic para los botones
    squareSpanish.addEventListener('click', (e) => {
        e.stopPropagation();
        setSpanishToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToSpanish();
    });

    // Botón micrófono: iniciar / detener grabación
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ Por favor, selecciona primero un idioma (Español o Alemán)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "es" ? "es-ES" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ Escuchando... Habla ahora";
            recognizedTextDiv.innerText = "Reconociendo voz...";
            translatedTextDiv.innerText = "Traduciendo...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ Falló el reconocimiento de voz";
            if (event.error === "not-allowed") errorMsg = "❌ Acceso al micrófono denegado";
            else if (event.error === "no-speech") errorMsg = "❌ No se detectó voz, inténtalo de nuevo";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ Presiona y Habla";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ No hay texto para traducir";
            return;
        }
        translatedTextDiv.innerHTML = "Traduciendo con Google...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ Falló la traducción, inténtalo de nuevo";
            translatedTextDiv.innerHTML = translation;

            // Leer la traducción en voz alta (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "es" ? "es-ES" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ No se pudo conectar al servicio de traducción, verifica tu conexión a internet";
        }
    }

    // Botón de regreso a la página principal (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // Detener grabación y síntesis de voz al salir de la página
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // Prueba de acceso al micrófono (silenciosa)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ El micrófono funciona");
        } catch(e) {
            console.warn("⚠️ No se puede acceder al micrófono");
        }
    }
    testMicrophone();

    // Estado inicial: ningún idioma seleccionado
    if(!sourceLang) {
        statusDiv.innerHTML = "Primero selecciona un idioma";
    }
</script>
</body>
</html>
