<!DOCTYPE html>
<html lang="tr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Anında Çevirmen · Türkçe Almanca</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tüm görsel efektler kaldırıldı */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Başlık: düz siyah metin */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Kare butonlar (sadece siyah çerçeve, beyaz arkaplan) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Aktif buton (seçildiğinde): gri arkaplan */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* Mikrofon butonu: sade beyaz, siyah çerçeve */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* Sonuç kutuları: siyah çerçeve, beyaz arkaplan */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* Durum mesajı */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* Ana sayfaya dönüş butonu */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇹🇷🗣️➡️🇩🇪 Anında Çevirmen</h1>
    </div>

    <!-- Kare butonlar (Türkçe / Almanca) -->
    <div class="square-buttons">
        <div class="lang-square" id="squareTurkish">
            <div class="lang-flag">🇹🇷</div>
            <div class="lang-name">Türkçe</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">Almanca</div>
        </div>
    </div>

    <div id="status" class="status-msg">Bir dil seçin</div>
    <button class="mic-btn" id="micButton">🎙️ Bas ve Konuş</button>

    <div class="result-box">
        <div class="result-label">KONUŞMA METNİ</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">ÇEVİRİ</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- Ana sayfaya dönüş butonu -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 Ana Sayfa · Ana Sayfaya Dön</button>
    </div>
</div>

<script>
    // ---------- Türkçe <-> Almanca anlık çeviri (tek tıklamalı kare butonlar) ----------
    let sourceLang = "";      // "tr" veya "de"
    let targetCode = "";      // "de" veya "tr"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squareTurkish = document.getElementById('squareTurkish');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // Tüm butonlardan aktif sınıfını kaldır
    function clearActiveSquares() {
        squareTurkish.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // Türkçe -> Almanca (tek tıklama)
    function setTurkishToGerman() {
        sourceLang = "tr";
        targetCode = "de";
        clearActiveSquares();
        squareTurkish.classList.add('active');   // Gri arkaplan
        statusDiv.innerHTML = "Türkçe → Almanca";
        if (isRecording) stopRecording();
    }

    // Almanca -> Türkçe (tek tıklama)
    function setGermanToTurkish() {
        sourceLang = "de";
        targetCode = "tr";
        clearActiveSquares();
        squareGerman.classList.add('active');   // Gri arkaplan
        statusDiv.innerHTML = "Almanca → Türkçe";
        if (isRecording) stopRecording();
    }

    // Butonlara tıklama olayları
    squareTurkish.addEventListener('click', (e) => {
        e.stopPropagation();
        setTurkishToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToTurkish();
    });

    // Mikrofon butonu: kaydı başlat / durdur
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ Lütfen önce bir dil seçin (Türkçe veya Almanca)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ Tarayıcınız ses tanımayı desteklemiyor. Lütfen Chrome veya Edge kullanın.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "tr" ? "tr-TR" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ Dinleniyor... Şimdi konuşun";
            recognizedTextDiv.innerText = "Ses tanınıyor...";
            translatedTextDiv.innerText = "Çeviri yapılıyor...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ Ses tanınamadı";
            if (event.error === "not-allowed") errorMsg = "❌ Mikrofon izni verilmedi";
            else if (event.error === "no-speech") errorMsg = "❌ Herhangi bir ses algılanamadı, tekrar deneyin";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ Bas ve Konuş";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ Çevrilecek metin yok";
            return;
        }
        translatedTextDiv.innerHTML = "Google Çeviri yapılıyor...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ Çeviri başarısız, tekrar deneyin";
            translatedTextDiv.innerHTML = translation;

            // Çeviriyi seslendir (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "tr" ? "tr-TR" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ Çeviri servisine bağlanılamadı, internet bağlantınızı kontrol edin";
        }
    }

    // Ana sayfaya dönüş butonu (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // Sayfadan ayrılırken kaydı ve ses sentezini durdur
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // Mikrofon erişim testi (sessizce)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ Mikrofon çalışıyor");
        } catch(e) {
            console.warn("⚠️ Mikrofon erişilemiyor");
        }
    }
    testMicrophone();

    // Başlangıç durumu: hiçbir dil seçilmedi
    if(!sourceLang) {
        statusDiv.innerHTML = "Önce bir dil seçin";
    }
</script>
</body>
</html>
