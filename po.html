<!DOCTYPE html>
<html lang="pl" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Natychmiastowy Tłumacz · Polski Niemiecki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Wszystkie efekty wizualne usunięte */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Tytuł: zwykły czarny tekst */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Kwadratowe przyciski (czarna ramka, białe tło) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Aktywny przycisk (po wybraniu): szare tło */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* Przycisk mikrofonu: biały, czarna ramka */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* Pola wyników: czarna ramka, białe tło */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* Komunikat statusu */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* Przycisk powrotu do strony głównej */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇵🇱🗣️➡️🇩🇪 Natychmiastowy Tłumacz</h1>
    </div>

    <!-- Kwadratowe przyciski (Polski / Niemiecki) -->
    <div class="square-buttons">
        <div class="lang-square" id="squarePolish">
            <div class="lang-flag">🇵🇱</div>
            <div class="lang-name">Polski</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">Niemiecki</div>
        </div>
    </div>

    <div id="status" class="status-msg">Wybierz język</div>
    <button class="mic-btn" id="micButton">🎙️ Naciśnij i mów</button>

    <div class="result-box">
        <div class="result-label">ROZPOZNANY TEKST</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">TŁUMACZENIE</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- Przycisk powrotu do strony głównej -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 Strona główna · Powrót do strony głównej</button>
    </div>
</div>

<script>
    // ---------- Natychmiastowe tłumaczenie: Polski <-> Niemiecki (kwadratowe przyciski jednym kliknięciem) ----------
    let sourceLang = "";      // "pl" lub "de"
    let targetCode = "";      // "de" lub "pl"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squarePolish = document.getElementById('squarePolish');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // Usuń klasę active ze wszystkich przycisków
    function clearActiveSquares() {
        squarePolish.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // Polski -> Niemiecki (jedno kliknięcie)
    function setPolishToGerman() {
        sourceLang = "pl";
        targetCode = "de";
        clearActiveSquares();
        squarePolish.classList.add('active');   // Szare tło
        statusDiv.innerHTML = "Polski → Niemiecki";
        if (isRecording) stopRecording();
    }

    // Niemiecki -> Polski (jedno kliknięcie)
    function setGermanToPolish() {
        sourceLang = "de";
        targetCode = "pl";
        clearActiveSquares();
        squareGerman.classList.add('active');   // Szare tło
        statusDiv.innerHTML = "Niemiecki → Polski";
        if (isRecording) stopRecording();
    }

    // Obsługa kliknięć przycisków
    squarePolish.addEventListener('click', (e) => {
        e.stopPropagation();
        setPolishToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToPolish();
    });

    // Przycisk mikrofonu: rozpocznij / zatrzymaj nagrywanie
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ Najpierw wybierz język (Polski lub Niemiecki)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ Twoja przeglądarka nie obsługuje rozpoznawania mowy. Użyj Chrome lub Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "pl" ? "pl-PL" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ Nasłuchiwanie... Mów teraz";
            recognizedTextDiv.innerText = "Rozpoznawanie mowy...";
            translatedTextDiv.innerText = "Tłumaczenie...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ Nie udało się rozpoznać mowy";
            if (event.error === "not-allowed") errorMsg = "❌ Odmowa dostępu do mikrofonu";
            else if (event.error === "no-speech") errorMsg = "❌ Nie wykryto mowy, spróbuj ponownie";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ Naciśnij i mów";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ Brak tekstu do tłumaczenia";
            return;
        }
        translatedTextDiv.innerHTML = "Tłumaczenie przez Google...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ Tłumaczenie nie powiodło się, spróbuj ponownie";
            translatedTextDiv.innerHTML = translation;

            // Odczytaj tłumaczenie (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "pl" ? "pl-PL" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ Nie można połączyć się z usługą tłumaczenia, sprawdź połączenie internetowe";
        }
    }

    // Przycisk powrotu do strony głównej (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // Zatrzymaj nagrywanie i syntezę mowy przy opuszczaniu strony
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // Test dostępu do mikrofonu (cichy)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ Mikrofon działa");
        } catch(e) {
            console.warn("⚠️ Brak dostępu do mikrofonu");
        }
    }
    testMicrophone();

    // Stan początkowy: nie wybrano języka
    if(!sourceLang) {
        statusDiv.innerHTML = "Najpierw wybierz język";
    }
</script>
</body>
</html>
