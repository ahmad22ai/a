<!DOCTYPE html>
<html lang="uk" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Миттєвий перекладач · Українська Німецька</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Всі візуальні ефекти видалено */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Заголовок: звичайний чорний текст */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Квадратні кнопки (тільки чорна рамка, білий фон) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Активна кнопка (при виборі): сірий фон */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* Кнопка мікрофона: біла, чорна рамка */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* Поля результатів: чорна рамка, білий фон */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* Повідомлення статусу */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* Кнопка повернення на головну */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇺🇦🗣️➡️🇩🇪 Миттєвий перекладач</h1>
    </div>

    <!-- Квадратні кнопки (Українська / Німецька) -->
    <div class="square-buttons">
        <div class="lang-square" id="squareUkrainian">
            <div class="lang-flag">🇺🇦</div>
            <div class="lang-name">Українська</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">Німецька</div>
        </div>
    </div>

    <div id="status" class="status-msg">Виберіть мову</div>
    <button class="mic-btn" id="micButton">🎙️ Натисніть і говоріть</button>

    <div class="result-box">
        <div class="result-label">РОЗПІЗНАНИЙ ТЕКСТ</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">ПЕРЕКЛАД</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- Кнопка повернення на головну сторінку -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 Головна · Повернутися на головну</button>
    </div>
</div>

<script>
    // ---------- Миттєвий переклад: Українська <-> Німецька (квадратні кнопки в один клік) ----------
    let sourceLang = "";      // "uk" або "de"
    let targetCode = "";      // "de" або "uk"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squareUkrainian = document.getElementById('squareUkrainian');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // Видалення активного класу з усіх кнопок
    function clearActiveSquares() {
        squareUkrainian.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // Українська -> Німецька (один клік)
    function setUkrainianToGerman() {
        sourceLang = "uk";
        targetCode = "de";
        clearActiveSquares();
        squareUkrainian.classList.add('active');   // Сірий фон
        statusDiv.innerHTML = "Українська → Німецька";
        if (isRecording) stopRecording();
    }

    // Німецька -> Українська (один клік)
    function setGermanToUkrainian() {
        sourceLang = "de";
        targetCode = "uk";
        clearActiveSquares();
        squareGerman.classList.add('active');   // Сірий фон
        statusDiv.innerHTML = "Німецька → Українська";
        if (isRecording) stopRecording();
    }

    // Обробники подій для кнопок
    squareUkrainian.addEventListener('click', (e) => {
        e.stopPropagation();
        setUkrainianToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToUkrainian();
    });

    // Кнопка мікрофона: запуск / зупинка запису
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ Будь ласка, спочатку виберіть мову (Українська або Німецька)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ Ваш браузер не підтримує розпізнавання мовлення. Використовуйте Chrome або Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "uk" ? "uk-UA" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ Слухаю... Говоріть зараз";
            recognizedTextDiv.innerText = "Розпізнавання мовлення...";
            translatedTextDiv.innerText = "Виконується переклад...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ Не вдалося розпізнати мовлення";
            if (event.error === "not-allowed") errorMsg = "❌ Доступ до мікрофона заборонено";
            else if (event.error === "no-speech") errorMsg = "❌ Не чути голосу, спробуйте ще раз";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ Натисніть і говоріть";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ Немає тексту для перекладу";
            return;
        }
        translatedTextDiv.innerHTML = "Переклад від Google...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ Не вдалося перекласти, спробуйте ще раз";
            translatedTextDiv.innerHTML = translation;

            // Озвучування перекладу (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "uk" ? "uk-UA" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ Не вдалося підключитися до сервісу перекладу, перевірте інтернет";
        }
    }

    // Кнопка повернення на головну сторінку (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // Зупинка запису та синтезу мовлення при виході зі сторінки
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // Тест доступу до мікрофона (без зайвих повідомлень)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ Мікрофон працює");
        } catch(e) {
            console.warn("⚠️ Немає доступу до мікрофона");
        }
    }
    testMicrophone();

    // Початковий стан: мова не вибрана
    if(!sourceLang) {
        statusDiv.innerHTML = "Спочатку виберіть мову";
    }
</script>
</body>
</html>
