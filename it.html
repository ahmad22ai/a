<!DOCTYPE html>
<html lang="it" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Traduttore Istantaneo · Italiano Tedesco</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tutti gli effetti visivi rimossi */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Titolo: testo nero semplice */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Pulsanti quadrati (bordo nero, sfondo bianco) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Pulsante attivo (quando selezionato): sfondo grigio */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* Pulsante microfono: bianco, bordo nero */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* Box dei risultati: bordo nero, sfondo bianco */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* Messaggio di stato */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* Pulsante di ritorno alla home */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇮🇹🗣️➡️🇩🇪 Traduttore Istantaneo</h1>
    </div>

    <!-- Pulsanti quadrati (Italiano / Tedesco) -->
    <div class="square-buttons">
        <div class="lang-square" id="squareItalian">
            <div class="lang-flag">🇮🇹</div>
            <div class="lang-name">Italiano</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">Tedesco</div>
        </div>
    </div>

    <div id="status" class="status-msg">Scegli una lingua</div>
    <button class="mic-btn" id="micButton">🎙️ Premi e Parla</button>

    <div class="result-box">
        <div class="result-label">TESTO RICONOSCIUTO</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">TRADUZIONE</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- Pulsante di ritorno alla home -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 Home · Torna alla pagina principale</button>
    </div>
</div>

<script>
    // ---------- Traduzione istantanea: Italiano <-> Tedesco (pulsanti quadrati con un clic) ----------
    let sourceLang = "";      // "it" o "de"
    let targetCode = "";      // "de" o "it"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squareItalian = document.getElementById('squareItalian');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // Rimuove la classe active da tutti i pulsanti
    function clearActiveSquares() {
        squareItalian.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // Italiano -> Tedesco (un clic)
    function setItalianToGerman() {
        sourceLang = "it";
        targetCode = "de";
        clearActiveSquares();
        squareItalian.classList.add('active');   // Sfondo grigio
        statusDiv.innerHTML = "Italiano → Tedesco";
        if (isRecording) stopRecording();
    }

    // Tedesco -> Italiano (un clic)
    function setGermanToItalian() {
        sourceLang = "de";
        targetCode = "it";
        clearActiveSquares();
        squareGerman.classList.add('active');   // Sfondo grigio
        statusDiv.innerHTML = "Tedesco → Italiano";
        if (isRecording) stopRecording();
    }

    // Gestori di clic per i pulsanti
    squareItalian.addEventListener('click', (e) => {
        e.stopPropagation();
        setItalianToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToItalian();
    });

    // Pulsante microfono: avvia / ferma registrazione
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ Seleziona prima una lingua (Italiano o Tedesco)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ Il tuo browser non supporta il riconoscimento vocale. Usa Chrome o Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "it" ? "it-IT" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ Ascolto in corso... Parla ora";
            recognizedTextDiv.innerText = "Riconoscimento vocale...";
            translatedTextDiv.innerText = "Traduzione in corso...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ Riconoscimento vocale fallito";
            if (event.error === "not-allowed") errorMsg = "❌ Accesso al microfono negato";
            else if (event.error === "no-speech") errorMsg = "❌ Nessun parlato rilevato, riprova";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ Premi e Parla";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ Nessun testo da tradurre";
            return;
        }
        translatedTextDiv.innerHTML = "Traduzione tramite Google...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ Traduzione fallita, riprova";
            translatedTextDiv.innerHTML = translation;

            // Leggi la traduzione ad alta voce (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "it" ? "it-IT" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ Impossibile connettersi al servizio di traduzione, controlla la connessione internet";
        }
    }

    // Pulsante di ritorno alla home (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // Ferma registrazione e sintesi vocale all'uscita dalla pagina
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // Test di accesso al microfono (silenzioso)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ Il microfono funziona");
        } catch(e) {
            console.warn("⚠️ Impossibile accedere al microfono");
        }
    }
    testMicrophone();

    // Stato iniziale: nessuna lingua selezionata
    if(!sourceLang) {
        statusDiv.innerHTML = "Seleziona prima una lingua";
    }
</script>
</body>
</html>
