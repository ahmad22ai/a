<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Sprechen Sie Deutsch · Übersetzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Hauptcontainer - keine Farben, keine Schatten */
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Header: deutscher Text, schwarz, ohne Effekte */
        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Grid für die rechteckigen Buttons (ohne Hintergrundfarbe, nur schwarzer Rand) */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0 25px;
        }

        /* Rechteckiger Button: kein Hintergrund, nur schwarzer Rand, weiße Innenseite */
        .lang-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: white;
            border: 2px solid black;
            border-radius: 0px;
            padding: 18px 12px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-decoration: none;
        }

        .lang-button:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Flaggen-Stil */
        .flag {
            font-size: 2.2rem;
        }

        .button-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: black;
        }

        /* Kleiner Hinweis-Text */
        .info-text {
            font-size: 0.8rem;
            color: #555;
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }

        @media (max-width: 550px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-button { padding: 14px 10px; }
            .flag { font-size: 1.8rem; }
            .button-text { font-size: 0.9rem; }
            .buttons-grid { gap: 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>Sprechen Sie Deutsch</h1>
        <p style="margin-top: 8px; color: #333; font-size: 0.9rem;">Wählen Sie Ihre Sprache</p>
    </div>

    <!-- Rechteckige Buttons: jeweils deutsches Flagge + Zielflagge, ohne Hintergrundfarbe -->
    <div class="buttons-grid">
        <!-- Arabisch -->
        <a href="ar.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇸🇦</span>
            <span class="button-text">العربية</span>
        </a>

        <!-- Englisch -->
        <a href="en.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇬🇧</span>
            <span class="button-text">English</span>
        </a>

        <!-- Französisch -->
        <a href="fr.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇫🇷</span>
            <span class="button-text">Français</span>
        </a>

        <!-- Persisch (Iran) -->
        <a href="ir.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇮🇷</span>
            <span class="button-text">فارسی</span>
        </a>

        <!-- Italienisch -->
        <a href="it.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇮🇹</span>
            <span class="button-text">Italiano</span>
        </a>

        <!-- Polnisch -->
        <a href="po.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇵🇱</span>
            <span class="button-text">Polski</span>
        </a>

        <!-- Spanisch -->
        <a href="sp.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇪🇸</span>
            <span class="button-text">Español</span>
        </a>

        <!-- Türkisch -->
        <a href="tr.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇹🇷</span>
            <span class="button-text">Türkçe</span>
        </a>

        <!-- Ukrainisch -->
        <a href="uk.html" class="lang-button">
            <span class="flag">🇩🇪</span>
            <span class="button-text">→</span>
            <span class="flag">🇺🇦</span>
            <span class="button-text">Українська</span>
        </a>
    </div>

    <div class="info-text">
        Klicken Sie auf eine Sprache, um mit dem Übersetzer zu beginnen
    </div>
</div>

<script>
    // Optional: Leichte Haptik für mobile Geräte (keine visuellen Effekte)
    const buttons = document.querySelectorAll('.lang-button');
    buttons.forEach(btn => {
        btn.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.97)';
        });
        btn.addEventListener('touchend', function() {
            this.style.transform = '';
        });
        btn.addEventListener('touchcancel', function() {
            this.style.transform = '';
        });
    });
</script>
</body>
</html>
