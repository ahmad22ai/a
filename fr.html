<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Traducteur Instantané · Français Allemand</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Arial', sans-serif;
            background: white;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Tous les effets visuels supprimés */
        .container {
            max-width: 560px;
            width: 100%;
            background: white;
            border-radius: 0px;
            padding: 28px 24px 38px 24px;
            text-align: center;
            border: none;
            box-shadow: none;
        }

        /* Titre : texte noir simple */
        .page-header {
            text-align: center;
            margin-bottom: 28px;
        }

        .page-header h1 {
            font-size: 1.9rem;
            font-weight: 600;
            color: black;
            background: none;
            text-shadow: none;
            letter-spacing: normal;
        }

        /* Boutons carrés (bordure noire, fond blanc) */
        .square-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 30px 0 25px;
            flex-wrap: wrap;
        }

        .lang-square {
            width: 110px;
            height: 110px;
            border-radius: 0px;
            background: white;
            border: 2px solid black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: none;
            gap: 6px;
        }

        .lang-square:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        /* Bouton actif (lorsqu'il est sélectionné) : fond gris */
        .lang-square.active {
            background: #d1d5db;
            border: 2px solid black;
            transform: scale(1.01);
        }

        .lang-flag {
            font-size: 2.8rem;
        }

        .lang-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: black;
            background: none;
            padding: 4px 12px;
            border-radius: 0px;
        }

        /* Bouton micro : blanc, bordure noire */
        .mic-btn {
            width: 100%;
            background: white;
            border: 2px solid black;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            border-radius: 0px;
            cursor: pointer;
            margin: 15px 0 25px;
            box-shadow: none;
            transition: 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .mic-btn.recording {
            background: #e5e7eb;
            border-color: black;
            animation: none;
        }

        /* Boîtes de résultats : bordure noire, fond blanc */
        .result-box {
            background: white;
            border-radius: 0px;
            padding: 16px 18px;
            margin-bottom: 16px;
            text-align: left;
            border: 1px solid black;
        }

        .result-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: black;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-align: left;
        }

        .result-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: black;
            word-break: break-word;
            line-height: 1.4;
            text-align: left;
        }

        #translatedText {
            color: black;
        }

        /* Message de statut */
        .status-msg {
            font-size: 0.8rem;
            background: #f5f5f5;
            display: inline-block;
            padding: 6px 16px;
            border-radius: 0px;
            color: black;
            margin-bottom: 12px;
            border: 1px solid #ccc;
        }

        /* Bouton retour à l'accueil */
        .home-btn {
            background: white;
            border: 2px solid black;
            padding: 12px 24px;
            border-radius: 0px;
            font-size: 1rem;
            font-weight: 600;
            color: black;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            transition: 0.1s;
        }

        .home-btn:active {
            transform: scale(0.97);
            background-color: #f5f5f5;
        }

        @media (max-width: 480px) {
            .container { padding: 20px 16px 30px; }
            .page-header h1 { font-size: 1.5rem; }
            .lang-square { width: 85px; height: 85px; }
            .lang-flag { font-size: 2.2rem; }
            .lang-name { font-size: 0.7rem; }
            .result-text { font-size: 1rem; }
            .mic-btn { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>🇫🇷🗣️➡️🇩🇪 Traducteur Instantané</h1>
    </div>

    <!-- Boutons carrés (Français / Allemand) -->
    <div class="square-buttons">
        <div class="lang-square" id="squareFrench">
            <div class="lang-flag">🇫🇷</div>
            <div class="lang-name">Français</div>
        </div>
        <div class="lang-square" id="squareGerman">
            <div class="lang-flag">🇩🇪</div>
            <div class="lang-name">Allemand</div>
        </div>
    </div>

    <div id="status" class="status-msg">Choisissez une langue</div>
    <button class="mic-btn" id="micButton">🎙️ Appuyez et parlez</button>

    <div class="result-box">
        <div class="result-label">TEXTE RECONNU</div>
        <div class="result-text" id="recognizedText">...</div>
    </div>

    <div class="result-box">
        <div class="result-label">TRADUCTION</div>
        <div class="result-text" id="translatedText">...</div>
    </div>

    <!-- Bouton retour à l'accueil -->
    <div>
        <button class="home-btn" id="homeBtn">🏠 Accueil · Retour à la page d'accueil</button>
    </div>
</div>

<script>
    // ---------- Traduction instantanée : Français <-> Allemand (boutons carrés en un clic) ----------
    let sourceLang = "";      // "fr" ou "de"
    let targetCode = "";      // "de" ou "fr"
    let isRecording = false;
    let recognition = null;

    const micButton = document.getElementById('micButton');
    const squareFrench = document.getElementById('squareFrench');
    const squareGerman = document.getElementById('squareGerman');
    const statusDiv = document.getElementById('status');
    const recognizedTextDiv = document.getElementById('recognizedText');
    const translatedTextDiv = document.getElementById('translatedText');
    const homeBtn = document.getElementById('homeBtn');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // Supprimer la classe active de tous les boutons
    function clearActiveSquares() {
        squareFrench.classList.remove('active');
        squareGerman.classList.remove('active');
    }

    // Français -> Allemand (un clic)
    function setFrenchToGerman() {
        sourceLang = "fr";
        targetCode = "de";
        clearActiveSquares();
        squareFrench.classList.add('active');   // Fond gris
        statusDiv.innerHTML = "Français → Allemand";
        if (isRecording) stopRecording();
    }

    // Allemand -> Français (un clic)
    function setGermanToFrench() {
        sourceLang = "de";
        targetCode = "fr";
        clearActiveSquares();
        squareGerman.classList.add('active');   // Fond gris
        statusDiv.innerHTML = "Allemand → Français";
        if (isRecording) stopRecording();
    }

    // Gestionnaires de clic pour les boutons
    squareFrench.addEventListener('click', (e) => {
        e.stopPropagation();
        setFrenchToGerman();
    });

    squareGerman.addEventListener('click', (e) => {
        e.stopPropagation();
        setGermanToFrench();
    });

    // Bouton micro : démarrer / arrêter l'enregistrement
    micButton.onclick = () => {
        if (!sourceLang) {
            alert("⚠️ Veuillez d'abord sélectionner une langue (Français ou Allemand)");
            return;
        }
        if (isRecording) {
            stopRecording();
        } else {
            startRecording();
        }
    };

    function startRecording() {
        if (!SpeechRecognition) {
            alert("❌ Votre navigateur ne prend pas en charge la reconnaissance vocale. Veuillez utiliser Chrome ou Edge.");
            return;
        }
        recognition = new SpeechRecognition();
        recognition.lang = sourceLang === "fr" ? "fr-FR" : "de-DE";
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        recognition.onstart = () => {
            isRecording = true;
            micButton.classList.add('recording');
            micButton.innerText = "⏹️ Écoute en cours... Parlez maintenant";
            recognizedTextDiv.innerText = "Reconnaissance vocale...";
            translatedTextDiv.innerText = "Traduction en cours...";
        };

        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            recognizedTextDiv.innerText = text;
            translateWithGoogle(text);
        };

        recognition.onerror = (event) => {
            console.warn(event);
            let errorMsg = "❌ Échec de la reconnaissance vocale";
            if (event.error === "not-allowed") errorMsg = "❌ Accès au microphone refusé";
            else if (event.error === "no-speech") errorMsg = "❌ Aucune parole détectée, réessayez";
            recognizedTextDiv.innerText = errorMsg;
            stopRecording();
        };

        recognition.onend = () => {
            if (isRecording) stopRecording();
        };
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            try {
                recognition.stop();
            } catch(e) {}
        }
        isRecording = false;
        micButton.classList.remove('recording');
        micButton.innerText = "🎙️ Appuyez et parlez";
    }

    async function translateWithGoogle(text) {
        if (!text.trim()) {
            translatedTextDiv.innerHTML = "⚠️ Aucun texte à traduire";
            return;
        }
        translatedTextDiv.innerHTML = "Traduction via Google...";
        try {
            const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetCode}&dt=t&q=${encodeURIComponent(text)}`;
            const response = await fetch(url);
            const data = await response.json();
            let translation = data[0][0][0];
            if (!translation) translation = "⚠️ La traduction a échoué, réessayez";
            translatedTextDiv.innerHTML = translation;

            // Lire la traduction à voix haute (TTS)
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(translation);
                utterance.lang = targetCode === "fr" ? "fr-FR" : "de-DE";
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            }
        } catch (error) {
            console.error(error);
            translatedTextDiv.innerHTML = "❌ Échec de connexion au service de traduction, vérifiez votre connexion Internet";
        }
    }

    // Bouton retour à l'accueil (index.html)
    homeBtn.addEventListener('click', (e) => {
        homeBtn.style.transform = "scale(0.96)";
        setTimeout(() => {
            window.location.href = "index.html";
        }, 100);
    });

    homeBtn.addEventListener('touchstart', () => {
        homeBtn.style.transform = "scale(0.96)";
    });
    homeBtn.addEventListener('touchend', () => {
        homeBtn.style.transform = "";
    });

    // Arrêter l'enregistrement et la synthèse vocale en quittant la page
    window.addEventListener("beforeunload", () => {
        if (recognition && isRecording) {
            try { recognition.stop(); } catch(e) {}
        }
        if (window.speechSynthesis) window.speechSynthesis.cancel();
    });

    // Test d'accès au microphone (silencieux)
    async function testMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            stream.getTracks().forEach(track => track.stop());
            console.log("✅ Le microphone fonctionne");
        } catch(e) {
            console.warn("⚠️ Impossible d'accéder au microphone");
        }
    }
    testMicrophone();

    // État initial : aucune langue sélectionnée
    if(!sourceLang) {
        statusDiv.innerHTML = "Sélectionnez d'abord une langue";
    }
</script>
</body>
</html>
